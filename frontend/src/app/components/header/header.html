<header
  class="header-area header-sticky"
  [class.background-header]="scrolled()"
>
  <div class="container">
    <div class="row">
      <div class="col-12">
        <nav class="main-nav">
          <!-- Logo -->
          <a routerLink="/" class="logo">
            <img src="assets/images/logo-supp.png" alt="Supportly" />
          </a>
          <!-- Menu -->
          <ul class="nav" [style.display]="menuOpen() ? 'block' : null">
            @if (isLoggedIn()) {
              @if (role() === 'customer') {
                <li class="scroll-to-section"><a routerLink="/tickets/new">Apply ticket</a></li>
                <li class="scroll-to-section"><a routerLink="/my-tickets">My tickets</a></li>
                <li class="scroll-to-section"><a href="#" (click)="logout($event)">Logout</a></li>
              } @else {
                <li class="scroll-to-section"><a routerLink="/dashboard">Dashboard</a></li>
                @if (role() === 'admin') {
                  <li class="scroll-to-section"><a routerLink="/users">Users</a></li>
                }
                <li class="scroll-to-section"><a routerLink="/profile">Profile</a></li>
                <li class="scroll-to-section"><a href="#" (click)="logout($event)">Logout</a></li>
                <li class="scroll-to-section"><a routerLink="/author">Author</a></li>
              }
            } @else {
              <li class="scroll-to-section"><a routerLink="/login">Login</a></li>
              <li class="scroll-to-section"><a routerLink="/author">Author</a></li>
            }
          </ul>
          <a class="menu-trigger" [class.active]="menuOpen()" (click)="toggleMenu()">
            <span>Menu</span>
          </a>
        </nav>
      </div>
    </div>
  </div>
</header>
