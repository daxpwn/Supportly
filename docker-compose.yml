services:
  # ---- SQL Server baza ----
  # Na Apple Silicon (M1/M2/M3/M4) zvanicni SQL Server image nema ARM build,
  # pa se pokrece kao amd64 preko Rosetta emulacije (platform: linux/amd64).
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    container_name: supportly-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_Strong_Pass123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---- .NET 10 API ----
  backend:
    build: ./backend
    container_name: supportly-backend
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:5064"
      # Override ConnString iz appsettings-a -> gadja SQL Server kontejner
      ConnString: "Server=sqlserver,1433;Database=Supportly;User Id=sa;Password=Your_Strong_Pass123;TrustServerCertificate=true;Encrypt=false;MultipleActiveResultSets=true"
    ports:
      - "5064:5064"
    volumes:
      - attachments:/app/wwwroot/Uploads

  # ---- Angular 21 (SSR / Node) ----
  frontend:
    build: ./frontend
    container_name: supportly-frontend
    depends_on:
      - backend
    environment:
      PORT: "4200"
    ports:
      - "4200:4200"

volumes:
  mssql-data:
  attachments:
