<div class="min-h-screen bg-gray-100 px-4 pt-28 pb-12">
  <div class="mx-auto max-w-5xl">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Tickets</h1>
    <p>This is the Tickets page.</p>

    <div class="bg-white rounded-lg shadow-md p-6">
      <div class="flex flex-wrap items-center gap-3 py-3">
        <input
          [value]="searchTerm()"
          (input)="searchTerm.set($any($event.target).value)"
          class="w-full max-w-sm min-w-[200px] rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none"
          placeholder="Search...">

        <label class="ml-auto flex items-center gap-2 text-sm text-gray-600">
          Prioritet:
          <select
            [value]="sortPriority()"
            (change)="sortPriority.set($any($event.target).value)"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
            <option value="none">Default</option>
            <option value="high">Visok → Nizak</option>
            <option value="low">Nizak → Visok</option>
          </select>
        </label>

        <label class="flex items-center gap-2 text-sm text-gray-600">
          Status:
          <select
            [value]="sortStatus()"
            (change)="sortStatus.set($any($event.target).value)"
            class="rounded-md border border-gray-300 px-3 py-2 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 focus:outline-none">
            <option value="none">Default</option>
            <option value="open">Otvoreni prvo</option>
            <option value="closed">Rešeni/Zatvoreni prvo</option>
          </select>
        </label>
      </div>

      <h2 class="text-xl font-semibold text-gray-700 mb-4">Ticket List</h2>
      <ul class="divide-y divide-gray-200">
        @for (ticket of paginatedTickets(); track ticket.id) {
          <li>
            <a
              [routerLink]="['/tickets', ticket.id]"
              class="py-4 flex items-center justify-between hover:bg-gray-50 transition-colors"
            >
              <span class="flex flex-col">
                <span class="text-gray-800 font-medium">{{ ticket.subject }}</span>
                <span class="text-xs text-gray-400">{{ ticket.ticketNumber }}</span>
              </span>
              <span class="text-gray-500">{{ ticket.status }} | {{ ticket.priority }}</span>
            </a>
          </li>
        }
      </ul>
      <div class="flex items-center justify-between mt-4">
        <button (click)="prevPage()" [disabled]="currentPage() === 1">Previous</button>
        <span>Page {{ currentPage() }} / {{ totalPages() }}</span>
        <button (click)="nextPage()" [disabled]="currentPage() === totalPages()">Next</button>
      </div>
    </div>
  </div>
</div>
