<header
  class="header-area header-sticky"
  [class.background-header]="scrolled()"
>
  <div class="container">
    <div class="row">
      <div class="col-12">
        <nav class="main-nav">
          <!-- Logo -->
          <a routerLink="/" class="logo">
            <img src="assets/images/logo.png" alt="Chain App Dev" />
          </a>
          <!-- Menu -->
          <ul class="nav" [style.display]="menuOpen() ? 'block' : null">
            <li class="scroll-to-section"><a routerLink="/author">Author</a></li>
            @if (isLoggedIn()) {
              <li class="scroll-to-section"><a href="#" (click)="logout($event)">Logout</a></li>
            } @else {
              <li class="scroll-to-section"><a routerLink="/login">Login</a></li>
            }
          </ul>
          <a class="menu-trigger" [class.active]="menuOpen()" (click)="toggleMenu()">
            <span>Menu</span>
          </a>
        </nav>
      </div>
    </div>
  </div>
</header>
