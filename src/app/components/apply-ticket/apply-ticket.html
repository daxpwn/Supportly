<div class="flex min-h-screen items-center justify-center bg-gray-100 px-4 pt-28 pb-12">
  <div class="w-full max-w-lg rounded-2xl bg-white p-8 shadow-xl sm:p-10">
    <h1 class="mb-2 text-2xl font-bold tracking-tight text-gray-900">Apply ticket</h1>
      <p class="mb-8 text-sm text-gray-500">Describe the problem and we will get back to you.</p>

      <form class="space-y-6" (ngSubmit)="onSubmit()">
        @if (error()) {
          <div class="rounded-lg bg-red-100 p-4 text-sm text-red-700" role="alert">
            {{ error() }}
          </div>
        }

        <div>
          <label for="subject" class="my-2 block text-sm font-medium text-gray-900">Subject</label>
          <input
            type="text"
            name="subject"
            id="subject"
            [(ngModel)]="subject"
            placeholder="Briefly describe the problem"
            required
            class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 placeholder-gray-400 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
          />
        </div>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label for="category" class="my-2 block text-sm font-medium text-gray-900">Category</label>
            <select
              name="category"
              id="category"
              [(ngModel)]="categoryId"
              required
              class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
            >
              <option [ngValue]="null" disabled>Select...</option>
              @for (c of categories(); track c.id) {
                <option [ngValue]="c.id">{{ c.name }}</option>
              }
            </select>
          </div>

          <div>
            <label for="priority" class="my-2 block text-sm font-medium text-gray-900">Priority</label>
            <select
              name="priority"
              id="priority"
              [(ngModel)]="priorityId"
              required
              class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
            >
              <option [ngValue]="null" disabled>Select...</option>
              @for (p of priorities(); track p.id) {
                <option [ngValue]="p.id">{{ p.name }}</option>
              }
            </select>
          </div>
        </div>

        <div>
          <label for="department" class="my-2 block text-sm font-medium text-gray-900">Department</label>
          <select
            name="department"
            id="department"
            [(ngModel)]="departmentId"
            class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
          >
            <option [ngValue]="null">Select... (optional)</option>
            @for (d of departments(); track d.id) {
              <option [ngValue]="d.id">{{ d.name }}</option>
            }
          </select>
        </div>

        <div>
          <label for="description" class="my-2 block text-sm font-medium text-gray-900">Description</label>
          <textarea
            name="description"
            id="description"
            rows="5"
            [(ngModel)]="description"
            placeholder="Describe the problem in detail..."
            required
            class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 placeholder-gray-400 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
          ></textarea>
        </div>

        <div>
          <label for="attachments" class="my-2 block text-sm font-medium text-gray-900">
            Attachments <span class="text-gray-400">(optional)</span>
          </label>
          <input
            type="file"
            name="attachments"
            id="attachments"
            multiple
            (change)="onFileChange($event)"
            accept=".pdf,.png,.jpg,.jpeg,.gif,.txt,.doc,.docx,.xls,.xlsx,.zip"
            class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-sm text-gray-900 file:mr-3 file:rounded-md file:border-0 file:bg-blue-600 file:px-4 file:py-2 file:text-sm file:font-medium file:text-white hover:file:bg-blue-700 focus:border-blue-600 focus:outline-none"
          />
          <p class="mt-1 text-xs text-gray-400">Max 10 MB per file.</p>
        </div>

        <button
          type="submit"
          [disabled]="submitting()"
          class="my-2 w-full rounded-lg bg-blue-600 px-5 py-3 text-center text-sm font-medium text-white hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 focus:outline-none disabled:opacity-60"
        >
          {{ submitting() ? 'Sending...' : 'Submit Ticket' }}
        </button>
      </form>
  </div>
</div>
