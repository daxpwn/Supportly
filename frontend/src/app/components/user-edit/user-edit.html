<div class="flex min-h-screen items-center justify-center bg-gray-100 px-4 pt-28 pb-12">
  <div class="w-full max-w-lg rounded-2xl bg-white p-8 shadow-xl sm:p-10">
    <a routerLink="/users" class="text-sm text-blue-600 hover:underline">← Nazad na korisnike</a>

    @if (loading()) {
      <p class="mt-4">Loading...</p>
    } @else {
      <h1 class="mt-4 mb-6 text-2xl font-bold tracking-tight text-gray-900">Edit user</h1>

      <form class="space-y-6" (ngSubmit)="onSubmit()">
        @if (error()) {
          <div class="rounded-lg bg-red-100 p-4 text-sm text-red-700" role="alert">
            {{ error() }}
          </div>
        }

        <div>
          <label for="fullName" class="my-2 block text-sm font-medium text-gray-900">Full name</label>
          <input
            type="text"
            name="fullName"
            id="fullName"
            [(ngModel)]="fullName"
            required
            class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
          />
        </div>

        <div>
          <label for="email" class="my-2 block text-sm font-medium text-gray-900">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            [(ngModel)]="email"
            required
            class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
          />
        </div>

        <div>
          <label for="phone" class="my-2 block text-sm font-medium text-gray-900">Phone</label>
          <input
            type="text"
            name="phone"
            id="phone"
            [(ngModel)]="phone"
            class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
          />
        </div>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label for="role" class="my-2 block text-sm font-medium text-gray-900">Role</label>
            <select
              name="role"
              id="role"
              [(ngModel)]="roleId"
              required
              class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
            >
              <option [ngValue]="null" disabled>Select...</option>
              @for (r of roles; track r.id) {
                <option [ngValue]="r.id">{{ r.name }}</option>
              }
            </select>
          </div>

          <div>
            <label for="department" class="my-2 block text-sm font-medium text-gray-900">Department</label>
            <select
              name="department"
              id="department"
              [(ngModel)]="departmentId"
              class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-3 text-gray-900 focus:border-blue-600 focus:ring-2 focus:ring-blue-200 focus:outline-none"
            >
              <option [ngValue]="null">Select... (optional)</option>
              @for (d of departments(); track d.id) {
                <option [ngValue]="d.id">{{ d.name }}</option>
              }
            </select>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <input type="checkbox" name="isActive" id="isActive" [(ngModel)]="isActive" />
          <label for="isActive" class="text-sm text-gray-900">Active</label>
        </div>

        <button
          type="submit"
          [disabled]="saving()"
          class="my-2 w-full rounded-lg bg-blue-600 px-5 py-3 text-center text-sm font-medium text-white hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 focus:outline-none disabled:opacity-60"
        >
          {{ saving() ? 'Saving...' : 'Save' }}
        </button>
      </form>
    }
  </div>
</div>
